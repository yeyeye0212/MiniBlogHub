<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于我ξ( ✿＞◡❛)</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='my_web.css') }}">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            z-index: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        h4 {
            font-size: 25px;
            color: rgb(0, 0, 0);
            top: 30px;
            left: 20px;
            position: absolute;
        }

        .forward {
            position: fixed;
            width: 100%;
            height: 50px;
            background-color: rgba(0, 0, 0, 0.5);
            left: 0;
            margin: 0;
            z-index: 1;
        }

        .forward_word {
            position: absolute;
            color: white;
            font-size: 20px;
            top: 50%;
            transform: translateY(-50%);
            left: 20px;
            font-family: 'Times New Roman', Times, serif;
            margin: 0;
            z-index: 2;
        }

        .top {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 20px;
            z-index: 3;
        }

        .skip {
            font-family: 'Times New Roman', Times, serif;
            font-size: 20px;
            display: flex;
            gap: 10px;
        }

        .skip li {
            color: white;
        }

        .skip li a {
            /*让点击后不会变成紫色的*/
            color: white;
            text-decoration: none;
        }

        .column_left {
            height: 100%;
            width: 320px;
            position: fixed;
            z-index: 1;
            background-color: rgb(141, 220, 244);
            border-radius: 0px 0px 10px 10px;
            top: 50px;
        }

        .silk {
            width: 50px;
            height: 150px;
            z-index: 5;
            background-color: sienna;
            left: 120px;
            position: fixed;
        }

        .silk_circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: sienna;
            position: fixed;
            left: 120px;
            top: 170px;
        }

        .silk_left {
            width: 10px;
            height: 200px;
            z-index: 5;
            background-color: sienna;
            left: 450px;
            position: fixed;
            position: absolute;
        }

        .silk_right {
            width: 10px;
            height: 150px;
            z-index: 5;
            background-color: sienna;
            left: 1600px;
            position: fixed;
            position: absolute;
            top: 50px;
        }

        .biaozhi {
            position: absolute;
            top: 600px;
            left: 10%;
            cursor: pointer;
        }

        .show {
            width: 1300px;
            height: 760px;
            background-color: rgba(91, 165, 250, 0.315);
            position: relative;
            border-radius: 10px;
            top: 170px;
            z-index: 3;
            left: 370px;
        }

        .blog-title {
            font-size: 40px;
            font-family: 'Times New Roman', Times, serif;
            color: rgb(28, 121, 252);
            top: 30px;
            left: 15px;
            position: absolute;
        }

        .white {
            background-color: white;
            width: 30px;
            height: 15px;
            position: absolute;
            top: 15px;
            left: 70px;
            border-radius: 2px;
        }

        .white2 {
            background-color: white;
            width: 30px;
            height: 15px;
            position: absolute;
            top: 15px;
            left: 1220px;
            border-radius: 2px;
        }

        .touxiang {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            position: absolute;
            object-fit: cover;
            object-position: center;
            top: 90px;
            left: 170px;
            border: 2px solid white;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .touxiang:hover {
            opacity: 0.8;
        }

        .skip {
            color: white;
            text-decoration: none;
        }

        /* 弹窗样式 */
        .alert_box{
            position: absolute;
            display: flex;
            z-index: 50;
            height: 300px;
            width: 500px;
            background-color: rgba(120, 210, 240, 0.831);
            top: 30%;
            border-radius: 10px;
            left: 37%;
            box-shadow: 0 0 10px 0 rgba(0, 0, 0, 0.5);
        }

        /* 设置一个黑框 */
        .whole {
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.477);
            z-index: 150;
            display: flex;
            position: fixed;
        }

        .check {
            font-size: 35px;
            color: rgb(0, 0, 0);
            top: 35%;
            left: 45%;
            position: fixed;
        }

        /* 头像上传相关样式 */
        .avatar-upload-container {
            position: absolute;
            top: 90px;
            left: 170px;
            width: 150px;
            height: 150px;
        }

        .avatar-upload-input {
            display: none;
        }

        .avatar-upload-label {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 16px;
            opacity: 0;
            transition: opacity 0.3s;
            position: absolute;
            top: 0;
            left: 0;
        }

        .avatar-upload-label:hover {
            opacity: 1;
        }

        .save-avatar-btn {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            padding: 5px 15px;
            background-color: #2ba8fb;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: none;
        }

        .save-avatar-btn:hover {
            background-color: #6fc5ff;
        }

        .avatar-preview {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            object-position: center;
            border: 2px solid white;
        }
    </style>
</head>

<body>
    <!-- 导航栏-->
    <div class="forward">
        <h6 class="forward_word">畅享所言</h6>
        <div class="top">
            <ul class="skip" type="none">
                <li><a href="{{ url_for('page', username=username) }}" id="move_for">广场 </a><span>|</span></li>
                <li><a href="{{ url_for('my_blog1', username=username) }}" id="move_for2">个人博客 </a><span>|</span></li>
                <li><a href="{{ url_for('my_information', username=username) }}" id="move_for3">关于我 </a></li>
            </ul>
        </div>
    </div>

    <!-- 左侧蓝色栏 -->
    <div class="column_left">
        <div class="silk"></div>
        <div class="silk_circle"></div>
        <!-- 炫酷方块 -->
        <div class="spinner">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
        </div>
        <!-- 发帖按钮 -->
        <button2 onclick="location.href='{{ url_for('post', username=username) }}'" >
            <h2 class="post">发布你的帖子吧！</h2>
        </button2>
        <img src="{{ url_for('static', filename='image/picture.png') }}" width="250px" height="250px" class="biaozhi">
    </div>

    <!-- 中间大工牌信息展示 -->
    <div class="silk_left"></div>
    <div class="silk_right"></div>
    <div class="show" id="father_box">
        <div class="white"></div>
        <div class="white2"></div>
        <h2 class="blog-title">个人信息</h2>
        <h4 style="top:120px">头像：</h4>

        <!-- 头像上传区域 -->
        <div class="avatar-upload-container" id="avatarContainer" style="display: none;">
    <img src="{{ avatar }}" class="avatar-preview" id="avatarPreview">
            <label for="avatarUpload" class="avatar-upload-label" id="avatarUploadLabel">
                点击上传新头像
            </label>
            <input type="file" id="avatarUpload" class="avatar-upload-input" accept="image/*">
            <button class="save-avatar-btn" id="saveAvatarBtn">保存头像</button>
        </div>

        <!-- 普通头像显示 -->
        <img src="{{ avatar }}" class="touxiang" id="normalAvatar">

        <h4 style="top:270px">昵称：{{ username }}</h4>
        <h4 style="top:370px">组别：{{ group }}</h4>
        <h4 style="top:470px">注册邮箱：{{ email }}</h4>
        <h4 style="top:570px">注册时间：{{ reg_time }}</h4>
        <h4 style="top:670px">个性签名：{{ signature }}</h4>

        <!-- 修改信息按钮 -->
        <button class="cta" id="editInfoBtn">
            <span class="hover-underline-animation">修改信息</span>
            <svg id="arrow-horizontal" xmlns="http://www.w3.org/2000/svg" width="30" height="10" viewBox="0 0 46 16">
                <path id="Path_10" data-name="Path 10"
                    d="M8,0,6.545,1.455l5.506,5.506H-30V9.039H12.052L6.545,14.545,8,16l8-8Z" transform="translate(30)">
                </path>
            </svg>
        </button>

        <!-- 退出登录按钮 -->
        <button class="cta" style="left:80%;bottom:10%" id="logoutBtn">
            <span class="hover-underline-animation"><a href="javascript:void(0)" id="return">退出登录</a></span>
            <svg id="arrow-horizontal" xmlns="http://www.w3.org/2000/svg" width="30" height="10"
                viewBox="0 0 46 16">
                <path id="Path_10" data-name="Path 10"
                    d="M8,0,6.545,1.455l5.506,5.506H-30V9.039H12.052L6.545,14.545,8,16l8-8Z"
                    transform="translate(30)">
                </path>
            </svg>
        </button>

        <button class="button_git" onclick="window.location.href='https://github.com/yeyeye0212/MiniBlogHub.git'">
                <svg viewBox="0 0 24 24" fill="currentColor" height="50" width="50" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M12.001 2C6.47598 2 2.00098 6.475 2.00098 12C2.00098 16.425 4.86348 20.1625 8.83848 21.4875C9.33848 21.575 9.52598 21.275 9.52598 21.0125C9.52598 20.775 9.51348 19.9875 9.51348 19.15C7.00098 19.6125 6.35098 18.5375 6.15098 17.975C6.03848 17.6875 5.55098 16.8 5.12598 16.5625C4.77598 16.375 4.27598 15.9125 5.11348 15.9C5.90098 15.8875 6.46348 16.625 6.65098 16.925C7.55098 18.4375 8.98848 18.0125 9.56348 17.75C9.65098 17.1 9.91348 16.6625 10.201 16.4125C7.97598 16.1625 5.65098 15.3 5.65098 11.475C5.65098 10.3875 6.03848 9.4875 6.67598 8.7875C6.57598 8.5375 6.22598 7.5125 6.77598 6.1375C6.77598 6.1375 7.61348 5.875 9.52598 7.1625C10.326 6.9375 11.176 6.825 12.026 6.825C12.876 6.825 13.726 6.9375 14.526 7.1625C16.4385 5.8625 17.276 6.1375 17.276 6.1375C17.826 7.5125 17.476 8.5375 17.376 8.7875C18.0135 9.4875 18.401 10.375 18.401 11.475C18.401 15.3125 16.0635 16.1625 13.8385 16.4125C14.201 16.725 14.5135 17.325 14.5135 18.2625C14.5135 19.6 14.501 20.675 14.501 21.0125C14.501 21.275 14.6885 21.5875 15.1885 21.4875C19.259 20.1133 21.9999 16.2963 22.001 12C22.001 6.475 17.526 2 12.001 2Z">
                    </path>
                </svg>
                <span>GitHub</span>
        </button>

        <!-- 保存所有修改的按钮（编辑模式下显示） -->
        <button class="cta" id="saveAllBtn" style="left:43%;bottom:10%; display: none;">
            <span class="hover-underline-animation">保存所有修改</span>
            <svg id="arrow-horizontal" xmlns="http://www.w3.org/2000/svg" width="30" height="10" viewBox="0 0 46 16">
                <path id="Path_10" data-name="Path 10"
                    d="M8,0,6.545,1.455l5.506,5.506H-30V9.039H12.052L6.545,14.545,8,16l8-8Z" transform="translate(30)">
                </path>
            </svg>
        </button>

        <!-- 取消编辑按钮 -->
        <button class="cta" id="cancelEditBtn" style="left:65%;bottom:10%; display: none;">
            <span class="hover-underline-animation">取消编辑</span>
            <svg id="arrow-horizontal" xmlns="http://www.w3.org/2000/svg" width="30" height="10" viewBox="0 0 46 16">
                <path id="Path_10" data-name="Path 10"
                    d="M8,0,6.545,1.455l5.506,5.506H-30V9.039H12.052L6.545,14.545,8,16l8-8Z" transform="translate(30)">
                </path>
            </svg>
        </button>
    </div>

    <script>
        // 导航栏鼠标悬停效果
        var move = document.getElementById("move_for");
        move.onmouseover = function () {
            move.style.color = "rgb(146, 222, 245)";
            move.style.fontWeight = 900;
        }
        move.onmouseout = function () {
            move.style.color = "white";
            move.style.fontWeight = "normal";
        }

        let move2 = document.getElementById("move_for2");
        move2.onmouseover = function () {
            move2.style.color = "rgb(146, 222, 245)";
        }
        move2.onmouseout = function () {
            move2.style.color = "white";
        }

        let move3 = document.getElementById("move_for3");
        move3.onmouseover = function () {
            move3.style.color = "rgb(146, 222, 245)";
        }
        move3.onmouseout = function () {
            move3.style.color = "white";
        }

        // 退出登录逻辑
        var return_btn = document.getElementById("return");
        return_btn.onclick = function (event) {
            event.preventDefault();//停止跳转

            const background = document.createElement('div');//新的背景盒子
            background.className = "whole";
            document.body.appendChild(background);//显示全局

            const new_box = document.createElement('div');//新的盒子
            new_box.className = "alert_box";
            background.appendChild(new_box);
            const check = document.createElement('h3');
            check.innerHTML = "确认退出登录？";
            check.className = "check";
            new_box.appendChild(check);

            // 把按钮往里加一下
            const button_left = `
<div class="return" >
    <button3 style="left:5%;" onclick="window.location.href='{{ url_for('logout') }}'">
        <svg height="40" width="40" xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 1024 1024">
                <path d="M874.690416 495.52477c0 11.2973-9.168824 20.466124-20.466124 20.466124l-604.773963 0 188.083679 188.083679c7.992021 7.992021 7.992021 20.947078 0 28.939099-4.001127 3.990894-9.240455 5.996574-14.46955 5.996574-5.239328 0-10.478655-1.995447-14.479783-5.996574l-223.00912-223.00912c-3.837398-3.837398-5.996574-9.046027-5.996574-14.46955 0-5.433756 2.159176-10.632151 5.996574-14.46955l223.019353-223.029586c7.992021 7.992021 20.957311-7.992021 28.949332 0 7.992021 8.002254 7.992021 20.957311 0 28.949332l-188.073446 188.073446 604.753497 0C865.521592 475.058646 874.690416 484.217237 874.690416 495.52477z">
                </path>
            </svg>
        <span class="button3_word">退出登录</span>
    </button3>
</div>`;
            const button_right = `
    <div class="return" >
        <button3 style="left:65%;" onclick="document.querySelector('.whole').remove()">
            <svg height="40" width="40" xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 1024 1024">
                <path transform="rotate(180 512 512)" d="M874.690416 495.52477c0 11.2973-9.168824 20.466124-20.466124 20.466124l-604.773963 0 188.083679 188.083679c7.992021 7.992021 7.992021 20.947078 0 28.939099-4.001127 3.990894-9.240455 5.996574-14.46955 5.996574-5.239328 0-10.478655-1.995447-14.479783-5.996574l-223.00912-223.00912c-3.837398-3.837398-5.996574-9.046027-5.996574-14.46955 0-5.433756 2.159176-10.632151 5.996574-14.46955l223.019353-223.029586c7.992021 7.992021 20.957311-7.992021 28.949332 0 7.992021 8.002254 7.992021 20.957311 0 28.949332l-188.073446 188.073446 604.753497 0C865.521592 475.058646 874.690416 484.217237 874.690416 495.52477z">
                </path>
            </svg>
            <span class="button3_word">返回页面</span>
        </button3>
    </div>
`;
            new_box.innerHTML += button_left + button_right;
            console.log("弹窗弹出");
        }

        // ========== 头像上传和修改信息功能 ==========
        const editInfoBtn = document.getElementById('editInfoBtn');
        const saveAllBtn = document.getElementById('saveAllBtn');
        const cancelEditBtn = document.getElementById('cancelEditBtn');
        const normalAvatar = document.getElementById('normalAvatar');
        const avatarContainer = document.getElementById('avatarContainer');
        const avatarUpload = document.getElementById('avatarUpload');
        const avatarPreview = document.getElementById('avatarPreview');
        const saveAvatarBtn = document.getElementById('saveAvatarBtn');

        // 其他信息元素
        const usernameDisplay = document.querySelector('h4[style*="top:270px"]');
        const groupDisplay = document.querySelector('h4[style*="top:370px"]');
        const emailDisplay = document.querySelector('h4[style*="top:470px"]');
        const signatureDisplay = document.querySelector('h4[style*="top:670px"]');

        let selectedAvatarFile = null;
        let isEditMode = false;

        // 点击修改信息按钮
        editInfoBtn.addEventListener('click', function() {
            isEditMode = true;

            // 隐藏普通头像，显示头像上传容器
            normalAvatar.style.display = 'none';
            avatarContainer.style.display = 'block';

            // 隐藏原按钮，显示保存和取消按钮
            editInfoBtn.style.display = 'none';
            saveAllBtn.style.display = 'block';
            cancelEditBtn.style.display = 'block';

            // 将其他信息变为可编辑（这里简单示例，你可以根据需要改为input框）
            const currentUsername = usernameDisplay.textContent.replace('昵称：', '');
            const currentGroup = groupDisplay.textContent.replace('组别：', '');
            const currentEmail = emailDisplay.textContent.replace('注册邮箱：', '');
            const currentSignature = signatureDisplay.textContent.replace('个性签名：', '');

            // 替换为可编辑的输入框
            usernameDisplay.innerHTML = `昵称：<input type="text" id="editUsername" value="${currentUsername}" style="font-size: 20px; padding: 5px;">`;
            groupDisplay.innerHTML = `组别：<input type="text" id="editGroup" value="${currentGroup}" style="font-size: 20px; padding: 5px;">`;
            emailDisplay.innerHTML = `注册邮箱：<input type="email" id="editEmail" value="${currentEmail}" style="font-size: 20px; padding: 5px;">`;
            signatureDisplay.innerHTML = `个性签名：<input type="text" id="editSignature" value="${currentSignature}" style="font-size: 20px; padding: 5px; width: 300px;">`;
        });

        // 头像上传预览
        avatarUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                selectedAvatarFile = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    avatarPreview.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // 保存所有修改
        saveAllBtn.addEventListener('click', function() {
            // 收集修改后的数据
            const formData = new FormData();

            if (selectedAvatarFile) {
                formData.append('avatar', selectedAvatarFile);
            }

            const newUsername = document.getElementById('editUsername')?.value;
            const newGroup = document.getElementById('editGroup')?.value;
            const newEmail = document.getElementById('editEmail')?.value;
            const newSignature = document.getElementById('editSignature')?.value;

            if (newUsername) formData.append('username', newUsername);
            if (newGroup) formData.append('group', newGroup);
            if (newEmail) formData.append('email', newEmail);
            if (newSignature) formData.append('signature', newSignature);

            // 发送到后端
            fetch('/update_profile_full', {
                method: 'POST',
                body: formData,
                credentials: 'same-origin'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('个人信息更新成功！');
                    // 刷新页面显示新数据
                    window.location.reload();
                } else {
                    alert('更新失败：' + data.msg);
                }
            })
            .catch(error => {
                console.error('更新错误：', error);
                alert('网络错误，更新失败！');
            });
        });

        // 取消编辑
        cancelEditBtn.addEventListener('click', function() {
            // 恢复原状
            normalAvatar.style.display = 'block';
            avatarContainer.style.display = 'none';
            editInfoBtn.style.display = 'block';
            saveAllBtn.style.display = 'none';
            cancelEditBtn.style.display = 'none';

            // 恢复文本显示
            usernameDisplay.innerHTML = `昵称：{{ username }}`;
            groupDisplay.innerHTML = `组别：{{ group }}`;
            emailDisplay.innerHTML = `注册邮箱：{{ email }}`;
            signatureDisplay.innerHTML = `个性签名：{{ signature }}`;

            selectedAvatarFile = null;
            isEditMode = false;
        });

        // 单独保存头像（如果你想要这个功能）
        saveAvatarBtn.addEventListener('click', function() {
            if (!selectedAvatarFile) {
                alert('请先选择要上传的头像');
                return;
            }

            const formData = new FormData();
            formData.append('avatar', selectedAvatarFile);

            fetch('/update_avatar', {
                method: 'POST',
                body: formData,
                credentials: 'same-origin'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('头像更新成功！');
                    // 更新普通头像的显示
                    normalAvatar.src = data.avatar_url + '?t=' + new Date().getTime(); // 添加时间戳避免缓存
                    // 退出编辑模式
                    cancelEditBtn.click();
                } else {
                    alert('头像更新失败：' + data.msg);
                }
            })
            .catch(error => {
                console.error('头像上传错误：', error);
                alert('网络错误，头像上传失败！');
            });
        });
    </script>
</body>

</html>
